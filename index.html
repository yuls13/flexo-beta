<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flexo">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B1219">
<title>Flexo Beta</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{height:100%;height:100dvh;background:#0B1219;font-family:'Manrope',-apple-system,sans-serif}
  body{height:100%;height:100dvh;overscroll-behavior:none;background:#0B1219;overflow:hidden}
  #root{height:100%;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  ::-webkit-scrollbar{width:0}
  textarea{font-family:'Manrope',-apple-system,sans-serif}
  #splash{position:fixed;inset:0;z-index:9999;background:#0B1219;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s}
  #splash.hide{opacity:0;pointer-events:none}
  #splash svg{width:80px;height:80px;margin-bottom:16px}
  #splash .name{color:#E4EEF2;font-size:28px;font-weight:800;letter-spacing:-1.5px;margin-bottom:6px}
  #splash .sub{color:#6B8FA8;font-size:12px}
  #splash .loader{width:40px;height:3px;background:#1E2D3D;border-radius:2px;margin-top:24px;overflow:hidden}
  #splash .bar{width:0%;height:100%;background:#448AFF;border-radius:2px;animation:load 1.5s ease-out forwards}
  @keyframes load{to{width:100%}}
  input{font-family:'Manrope',-apple-system,sans-serif}
</style>
</head>
<body>
<div id="splash">
  <svg viewBox="0 0 100 100"><rect x="0" y="0" width="100" height="100" rx="24" fill="#111B26" stroke="#448AFF" stroke-width="2.5" opacity="0.6"/><path d="M32 76 L32 28 Q32 22 38 22L68 22" fill="none" stroke="#448AFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M32 48 L60 48" fill="none" stroke="#00E676" stroke-width="8" stroke-linecap="round"/><circle cx="68" cy="22" r="5.5" fill="#448AFF"/><circle cx="60" cy="48" r="5.5" fill="#00E676"/><circle cx="32" cy="76" r="5.5" fill="#448AFF"/></svg>
  <div class="name">flexo</div>
  <div class="sub">Version bêta</div>
  <div class="loader"><div class="bar"></div></div>
</div>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  setTimeout(()=>{document.getElementById('splash').classList.add('hide');setTimeout(()=>document.getElementById('splash').remove(),500)},1800);
  if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
</body>
</html>
